name: Blocky (Dev)
version: dev-c39f27e
slug: blocky_dev
description: Fast and lightweight DNS proxy and ad-blocker for your network
url: https://github.com/robocopklaus/hassio-addon-blocky/tree/main/blocky
arch:
  - amd64
  - aarch64
watchdog: "http://[HOST]:[PORT:4000]/api/blocking/status"
init: false
startup: system
ports:
  53/tcp: 53
  53/udp: 53
  4000/tcp: 4000
  443/tcp: null
  443/udp: null
ports_description:
  53/tcp: DNS TCP port
  53/udp: DNS UDP port
  4000/tcp: HTTP API and metrics port
  443/tcp: HTTPS API and DNS-over-HTTPS port
  443/udp: DNS-over-HTTPS over HTTP/3 port
map:
  - addon_config:rw
  - ssl:ro
options:
  upstreams:
    groups:
      - name: default
        resolvers:
          - tcp-tls:one.one.one.one
          - tcp-tls:dns.google
          - https://cloudflare-dns.com/dns-query
    init_strategy: blocking
    strategy: parallel_best
    timeout: 2s
    start_verify: false
    quic:
      max_idle_timeout: ""
      keep_alive_period: ""
  connect_ip_version: dual
  bootstrap:
    dns:
      - upstream: 1.1.1.1
      - upstream: 8.8.8.8
  filtering:
    query_types: []
  fqdn_only:
    enable: false
  custom_dns:
    mapping: []
    rewrite: []
    custom_ttl: 1h
    filter_unmapped_types: true
  conditional:
    rewrite: []
    mapping: []
    fallback_upstream: false
  ecs:
    use_as_client: false
    forward: false
  dns64:
    enable: false
    prefixes: []
    exclusion_set: []
  rebinding_protection:
    enable: false
    allowed_domains: []
  client_lookup:
    upstream: ""
    single_name_order: []
    clients: []
  blocking:
    denylists:
      - name: ads
        sources:
          - https://s3.amazonaws.com/lists.disconnect.me/simple_ad.txt
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
      - name: tracking
        sources:
          - https://s3.amazonaws.com/lists.disconnect.me/simple_tracking.txt
    allowlists: []
    client_groups_block:
      - name: default
        lists:
          - ads
          - tracking
    schedules: []
    list_schedules: []
    block_type: zeroIp
    block_ttl: 6h
    download_cache: false
  caching:
    min_time: ""
    max_time: ""
    max_items_count: 0
    prefetching: false
    prefetch_expires: ""
    prefetch_threshold: 0
    prefetch_max_items_count: 0
    cache_time_negative: ""
    exclude: []
  redis:
    address: ""
    username: ""
    password: ""
    database: 0
    required: false
    connection_attempts: 3
    connection_cooldown: 1s
  prometheus:
    enable: false
    path: /metrics
  https:
    enable: false
    cert_file: ""
    key_file: ""
  http3:
    enable: false
  query_log:
    type: ""
    target: ""
    db_host: ""
    db_port: 0
    db_username: ""
    db_password: ""
    db_database: ""
    log_retention_days: 0
    creation_attempts: 3
    creation_cooldown: 2s
    fields: []
    flush_interval: 30s
  log:
    level: info
    timestamp: true
    privacy: true
  custom_config: false
schema:
  upstreams:
    groups:
      - name: str
        resolvers:
          - match(^(https://[^\s]+|sdns://[^\s]+|(?:tcp\+udp|tcp-tls|tcp|udp|quic):[^\s]+|[^\s:]+(?::[0-9]{1,5})?)$)
    init_strategy: list(blocking|failOnError|fast)?
    strategy: list(parallel_best|random|strict)?
    timeout: str?
    start_verify: bool?
    user_agent: str?
    quic:
      max_idle_timeout: str?
      keep_alive_period: str?
  connect_ip_version: list(dual|v4|v6)?
  bootstrap:
    dns:
      - upstream: str
        ips:
          - str?
  filtering:
    query_types:
      - str
  fqdn_only:
    enable: bool?
  custom_dns:
    mapping:
      - hostname: str
        ips: str
    rewrite:
      - source: str
        target: str
    custom_ttl: str?
    filter_unmapped_types: bool?
  conditional:
    rewrite:
      - source: str
        target: str
    mapping:
      - domain: str
        resolvers:
          - str
    fallback_upstream: bool?
  ecs:
    use_as_client: bool?
    forward: bool?
  dns64:
    enable: bool?
    prefixes:
      - str
    exclusion_set:
      - str
  rebinding_protection:
    enable: bool?
    allowed_domains:
      - str
  client_lookup:
    upstream: str?
    single_name_order:
      - match(^[1-9][0-9]*$)
    clients:
      - name: str
        addresses:
          - str
  blocking:
    denylists:
      - name: str
        sources:
          - str
    allowlists:
      - name: str
        sources:
          - str
    client_groups_block:
      - name: str
        lists:
          - str
    schedules:
      - name: str
        weekdays:
          - list(mon|tue|wed|thu|fri|sat|sun)
        start: match(^([01][0-9]|2[0-3]):[0-5][0-9]$)?
        end: match(^([01][0-9]|2[0-3]):[0-5][0-9]$)?
    list_schedules:
      - list_name: str
        schedules:
          - str
    block_type: match(^(zeroIp|nxDomain|((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}|([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4})(,\s*((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}|([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}))*)$)?
    block_ttl: str?
    download_cache: bool?
  caching:
    min_time: str?
    max_time: str?
    max_items_count: int(0,)?
    prefetching: bool?
    prefetch_expires: str?
    prefetch_threshold: int(0,)?
    prefetch_max_items_count: int(0,)?
    cache_time_negative: str?
    exclude:
      - str
  redis:
    address: str?
    username: str?
    password: password?
    database: int(0,15)?
    required: bool?
    connection_attempts: int(1,)?
    connection_cooldown: str?
  prometheus:
    enable: bool?
    path: str?
  https:
    enable: bool?
    cert_file: str?
    key_file: str?
  http3:
    enable: bool?
  query_log:
    type: list(|none|csv|csv-client|console|sqlite|mysql|postgresql|timescale)?
    target: str?
    db_host: str?
    db_port: int(0,65535)?
    db_username: str?
    db_password: password?
    db_database: str?
    log_retention_days: int(0,)?
    creation_attempts: int(1,)?
    creation_cooldown: str?
    fields:
      - list(clientIP|clientName|responseReason|responseAnswer|question|duration)
    flush_interval: str?
  log:
    level: list(trace|debug|info|warn|error)?
    timestamp: bool?
    privacy: bool?
  custom_config: bool?
