name: Lint

on:
  push:
    branches: [main]
    paths:
      - "blocky/Dockerfile"
      - "blocky/config.yaml"
      - "blocky/rootfs/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".hadolint.yaml"
      - ".shellcheckrc"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Config Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Check config contracts
        run: node scripts/check-config-contract.mjs

  render-test:
    name: Render Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the provisioned tempio/blocky binaries, keyed on the Dockerfile
      # (the single version pin). A Renovate bump changes the key and re-downloads.
      - name: Cache render binaries
        uses: actions/cache@v6
        with:
          path: scripts/render-test/.bin
          key: render-bin-${{ runner.os }}-${{ hashFiles('blocky/Dockerfile') }}

      - name: Render fixtures and assert against goldens
        run: pnpm run check:render

  guard-test:
    name: Guard Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test config.sh guards against the render goldens
        run: bash scripts/test-guards.sh

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: blocky/Dockerfile

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: blocky/rootfs
