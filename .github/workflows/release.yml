name: Release Blocky

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release without publishing artifacts"
        type: boolean
        default: false
      rollback_version:
        description: "Rollback latest tags to a previously published version"
        type: string
        required: false
        default: ""

# Prevent multiple releases from running simultaneously
concurrency:
  group: release-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Dynamic image name based on repository
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
  BUILD_DESCRIPTION: Fast and lightweight DNS proxy and ad-blocker for your network
  BUILD_NAME: Blocky

jobs:
  semantic_release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: inputs.rollback_version == ''
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      published: ${{ steps.semantic.outputs.new_release_published }}
      commit_sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        with:
          dry_run: ${{ inputs.dry_run }}
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Get commit SHA after semantic-release
        id: get_sha
        run: |
          git fetch origin main
          echo "sha=$(git rev-parse origin/main)" >> $GITHUB_OUTPUT

  build_and_publish:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: semantic_release
    if: needs.semantic_release.outputs.published == 'true' && inputs.dry_run != 'true' && inputs.rollback_version == ''
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Checkout the commit that includes version updates from semantic-release
          ref: ${{ needs.semantic_release.outputs.commit_sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read build configuration
        id: build_config
        run: |
          # Extract base images from build.yaml for each architecture
          AMD64_BASE=$(yq '.build_from.amd64' blocky/build.yaml)
          ARM64_BASE=$(yq '.build_from.aarch64' blocky/build.yaml)

          echo "amd64_base=${AMD64_BASE}" >> $GITHUB_OUTPUT
          echo "arm64_base=${ARM64_BASE}" >> $GITHUB_OUTPUT

      - name: Set build metadata
        id: build_meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "build_ref=${{ needs.semantic_release.outputs.commit_sha }}" >> $GITHUB_OUTPUT

      - name: Build and export amd64 for scanning
        uses: docker/build-push-action@v7
        env:
          VERSION: ${{ needs.semantic_release.outputs.version }}
        with:
          context: blocky
          file: blocky/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          build-args: |
            BUILD_ARCH=amd64
            BUILD_FROM=${{ steps.build_config.outputs.amd64_base }}
            BUILD_VERSION=${{ needs.semantic_release.outputs.version }}
            BUILD_DESCRIPTION=${{ env.BUILD_DESCRIPTION }}
            BUILD_NAME=${{ env.BUILD_NAME }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_REF=${{ steps.build_meta.outputs.build_ref }}
            BUILD_DATE=${{ steps.build_meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test amd64 image
        run: |
          set -euo pipefail
          echo "::group::Running smoke tests"

          # Verify Blocky binary runs
          docker run --rm --entrypoint blocky ${{ env.IMAGE_NAME }}:scan version

          # Verify Tempio is installed (no dedicated --version flag; extract from help output)
          docker run --rm --entrypoint sh ${{ env.IMAGE_NAME }}:scan -c "tempio --help 2>&1 | grep Version"

          echo "::endgroup::"
          echo "::notice::Smoke tests passed"

      - name: Build and push architecture-specific images
        env:
          VERSION: ${{ needs.semantic_release.outputs.version }}
        run: |
          set -euo pipefail

          echo "::group::Building architecture-specific images"

          # Build function for each architecture
          build_arch() {
            local ARCH="$1"
            local PLATFORM="$2"
            local BUILD_FROM="$3"

            echo "::notice::Building ${ARCH} for ${PLATFORM}"

            docker buildx build \
              --platform "${PLATFORM}" \
              --push \
              --tag "${IMAGE_NAME}/${ARCH}:${VERSION}" \
              --tag "${IMAGE_NAME}/${ARCH}:latest" \
              --file blocky/Dockerfile \
              --build-arg BUILD_ARCH="${ARCH}" \
              --build-arg BUILD_FROM="${BUILD_FROM}" \
              --build-arg BUILD_VERSION="${VERSION}" \
              --build-arg BUILD_DESCRIPTION="${BUILD_DESCRIPTION}" \
              --build-arg BUILD_NAME="${BUILD_NAME}" \
              --build-arg BUILD_REPOSITORY="${GITHUB_REPOSITORY}" \
              --build-arg BUILD_REF="${{ steps.build_meta.outputs.build_ref }}" \
              --build-arg BUILD_DATE="${{ steps.build_meta.outputs.build_date }}" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              blocky || return 1

            echo "::notice::Successfully built ${ARCH}"
          }

          # Build all architectures
          build_arch amd64 linux/amd64 "${{ steps.build_config.outputs.amd64_base }}" || exit 1
          build_arch aarch64 linux/arm64 "${{ steps.build_config.outputs.arm64_base }}" || exit 1

          echo "::endgroup::"

      - name: Create and push multi-arch manifest
        env:
          VERSION: ${{ needs.semantic_release.outputs.version }}
        run: |
          set -euo pipefail

          echo "::group::Creating multi-arch manifest"

          echo "::group::Validating architecture images"
          docker buildx imagetools inspect "${IMAGE_NAME}/amd64:${VERSION}" > /dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}/aarch64:${VERSION}" > /dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}/amd64:latest" > /dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}/aarch64:latest" > /dev/null
          echo "::endgroup::"

          # Create manifest for versioned tag
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${VERSION}" \
            "${IMAGE_NAME}/amd64:${VERSION}" \
            "${IMAGE_NAME}/aarch64:${VERSION}"

          # Create manifest for latest tag
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}/amd64:latest" \
            "${IMAGE_NAME}/aarch64:latest"

          echo "::endgroup::"

          echo "::notice::Multi-arch manifest created successfully"

      - name: Inspect and summarize images
        env:
          VERSION: ${{ needs.semantic_release.outputs.version }}
        run: |
          set -euo pipefail

          echo "::group::Image Summary"

          echo "### Published Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Inspect multi-arch manifest
          echo "#### Multi-arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List all tags
          echo "#### Published Tags" >> $GITHUB_STEP_SUMMARY
          echo "- \`${IMAGE_NAME}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${IMAGE_NAME}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${IMAGE_NAME}/amd64:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${IMAGE_NAME}/aarch64:${VERSION}\`" >> $GITHUB_STEP_SUMMARY

          echo "::endgroup::"

          echo "::notice::Release ${VERSION} published successfully to GHCR"

  rollback_latest:
    name: Rollback Latest Tags
    runs-on: ubuntu-latest
    if: inputs.rollback_version != '' && inputs.dry_run != 'true'
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ inputs.rollback_version }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate rollback source tags
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" > /dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}/amd64:${VERSION}" > /dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}/aarch64:${VERSION}" > /dev/null

      - name: Repoint architecture latest tags
        run: |
          set -euo pipefail
          docker buildx imagetools create -t "${IMAGE_NAME}/amd64:latest" "${IMAGE_NAME}/amd64:${VERSION}"
          docker buildx imagetools create -t "${IMAGE_NAME}/aarch64:latest" "${IMAGE_NAME}/aarch64:${VERSION}"

      - name: Repoint multi-arch latest manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}/amd64:latest" \
            "${IMAGE_NAME}/aarch64:latest"

      - name: Summarize rollback
        run: |
          echo "### Rollback completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Latest tags now point to version: \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
